<div class="signup-page">
  <div class="left-panel">
    <div class="logo-container">
      <img src="logo-branca.png" alt="Morar Construtora e Incorporadora" class="logo">
    </div>
  </div>
  <div class="right-panel">
    <div class="signup-card">
      <h2 class="title">Criar conta</h2>

      <button class="google-btn">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24px" height="24px">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        Sign Up with Google
      </button>

      <div class="divider">
        <span class="divider-text">OU CADASTRE-SE COM EMAIL</span>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Formulário de Cadastro -->
      <form *ngIf="!showConfirmation" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name" class="label">Nome completo</label>
          <input type="text" id="name" class="input" placeholder="Frederico Ipsum" formControlName="name">
          <span class="input-error" *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched">
            Nome é obrigatório
          </span>
        </div>

        <div class="form-group">
          <label for="email" class="label">E-mail</label>
          <input type="email" id="email" class="input" placeholder="frederico@example.com" formControlName="email">
          <span class="input-error" *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
            Digite um e-mail válido
          </span>
        </div>

        <div class="form-group">
          <label for="password" class="label">Senha</label>
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" id="password" class="input password-input" placeholder="••••••••" formControlName="password">
            <button type="button" class="eye-btn" (click)="togglePassword()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="input-error" *ngIf="signupForm.get('password')?.errors?.['required'] && signupForm.get('password')?.touched">
            Senha é obrigatória
          </span>
          <span class="input-error" *ngIf="signupForm.get('password')?.errors?.['minlength'] && signupForm.get('password')?.touched">
            Mínimo de 8 caracteres
          </span>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="label">Confirmar senha</label>
          <div class="password-wrapper">
            <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirm-password" class="input password-input" placeholder="••••••••" formControlName="confirmPassword">
            <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
              <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="input-error" *ngIf="signupForm.hasError('mismatch') && signupForm.get('confirmPassword')?.touched">
            As senhas não conferem
          </span>
        </div>

        <div class="actions">
          <label class="terms">
            <input type="checkbox" class="checkbox" formControlName="terms">
            <span>Eu aceito os <a href="#" class="terms-link">Termos e Condições</a></span>
          </label>
        </div>

        <button type="submit" class="submit-btn" [disabled]="signupForm.invalid || isLoading">
          {{ isLoading ? 'Cadastrando...' : 'Cadastrar' }}
        </button>
      </form>

      <!-- Formulário de Confirmação -->
      <form *ngIf="showConfirmation" [formGroup]="confirmationForm" (ngSubmit)="onConfirm()">
        <p class="confirmation-text">
          Enviamos um código de verificação para o seu e-mail <strong>{{ emailToConfirm }}</strong>.
        </p>
        <div class="form-group">
          <label for="code" class="label">Código de Verificação</label>
          <input type="text" id="code" class="input" placeholder="123456" formControlName="code">
          <span class="input-error" *ngIf="confirmationForm.get('code')?.invalid && confirmationForm.get('code')?.touched">
            Código é obrigatório
          </span>
        </div>
        <button type="submit" class="submit-btn" [disabled]="confirmationForm.invalid || isLoading">
          {{ isLoading ? 'Confirmando...' : 'Confirmar' }}
        </button>
        
        <button type="button" class="resend-btn" (click)="onResendCode()" [disabled]="isLoading">
          Reenviar código
        </button>
      </form>

      <div class="footer">
        <span>Ja tem conta? <a routerLink="/" class="login-link">Entrar</a></span>
      </div>
    </div>
  </div>
</div>
