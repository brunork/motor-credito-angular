<div class="forgot-password-page">
  <div class="left-panel">
    <div class="logo-container">
      <img src="logo-branca.png" alt="Morar Construtora e Incorporadora" class="logo">
    </div>
  </div>
  <div class="right-panel">
    <div class="card">
      <div class="icon-container">
        <div class="icon-circle">
          <!-- Custom Lock Icon SVG to match reference -->
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Lock Shackle (Handle) -->
            <path d="M19 25V18C19 11.9249 23.9249 7 30 7C36.0751 7 41 11.9249 41 18V25" stroke="#D48600" stroke-width="6" stroke-linecap="round"/>
            <!-- Lock Body -->
            <rect x="15" y="25" width="30" height="24" rx="4" fill="#FFC107"/>
            <!-- Lock Body Side (3D effect) -->
            <path d="M45 29V45C45 47.2091 43.2091 49 41 49H19C16.7909 49 15 47.2091 15 45V29H45Z" fill="#FFB300"/> 
            <!-- Keyhole -->
            <!-- <circle cx="30" cy="37" r="3" fill="#8F5902"/> -->
          </svg>
        </div>
      </div>

      <h2 class="title">Recupere sua senha</h2>

      <form>
        <div class="form-group">
          <label for="email" class="label">E-mail</label>
          <input type="email" id="email" class="input" placeholder="frederico@example.com">
        </div>

        <button type="submit" class="submit-btn">Recuperar senha</button>
      </form>

      <div class="footer">
        <span>Voltar para <a routerLink="/" class="login-link">Login</a></span>
      </div>
    </div>
  </div>
</div>
